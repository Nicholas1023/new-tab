<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
        <link rel="stylesheet" href="src/style.css">
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="search-ui">
            <input type="text" placeholder="Search anything..." id="searchBar">
            <button type="submit" style="background-color: rgba(0,0,0,0);" onclick="window.location.href=`https://${document.getElementById('searchURL').value}?q=${document.getElementById('searchBar').value}`">
                <i class="fa-solid fa-xl fa-magnifying-glass"></i>
            </button>
            <select id="searchURL">
                <option value="google.com/search">Google Search</option>
                <option value="bing.com/search">Microsoft Bing</option>
                <option value="duckduckgo.com">DuckDuckGo</option>
                <option value="github.com/search">GitHub</option>
            </select>
        </div>
        <p id="time"></p>
        <footer>
            <small id="imageCopyright">Attribution: Background image from NASA APOD API.</small>
            <small>Custom new tab page by Nicholas Lim.</small>
        </footer>
        <script type="module" src="src/main.js"></script>
        <script src="https://kit.fontawesome.com/c13c173d03.js" crossorigin="anonymous"></script>
    </body>
</html>
